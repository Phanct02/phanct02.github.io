<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bất Ngờ Dành Cho Em</title>
  <!-- Google Fonts: Lobster -->
  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Nút Play Music (sẽ hiển thị nếu autoplay bị chặn) -->
  <button id="play-music">Play Music</button>
  
  <!-- Container chứa stage (nơi hiển thị text & trái tim) -->
  <div id="container">
  <div id="stage">
    <div class="text" style="left:100px; top:50px;">Tớ mong cậu sớm muộn gì thì của là của riêng tớ :))</div>
    <div class="text" style="left:200px; top:150px;">Và mong ràng cậu sẽ không thuộc về anh Bạn Bin da đen</div>
    <!-- Thêm các phần tử text khác -->
  </div>
</div>

  
  <!-- Nhạc nền tự phát từ URL -->
  <audio id="bg-music" src="https://phancext02.github.io/uploads/1/5/0/9/150978976/music.mp3" loop autoplay style="display: none;"></audio>
  
  <script src="script.js"></script>
</body>
</html>
